<!DOCTYPE html>
<html lang="ko">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        body { font-family: 'Jua', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center py-12 px-4">

    <div class="max-w-2xl w-full text-center">
        <h1 class="text-4xl font-bold text-slate-800 mb-4">💻 이진수 변환 원리</h1>
        <p class="text-slate-500 mb-12 text-lg">컴퓨터가 숫자를 기억하는 방법을 함께 알아봐요!</p>

        <!-- 학습 및 게임 리스트 -->
        <div class="grid gap-6">
            
            <!-- 1. 원리 이해하기 카드 -->
            <a href="./theory/index.html" class="group bg-white p-6 rounded-2xl shadow-md hover:shadow-xl transition-all flex items-center border-2 border-transparent hover:border-emerald-400">
                <div class="w-16 h-16 bg-emerald-100 rounded-xl flex items-center justify-center text-emerald-500 text-3xl mr-6 group-hover:scale-110 transition-transform">
                    <i class="fas fa-book-open"></i>
                </div>
                <div class="text-left">
                    <h2 class="text-2xl font-bold text-slate-800">이진수 변환 원리 이해하기</h2>
                    <p class="text-slate-500">십진수를 이진수로 바꾸는 방법을 차근차근 배워요.</p>
                </div>
                <div class="ml-auto text-slate-300 group-hover:text-emerald-400 transition-colors">
                    <i class="fas fa-chevron-right text-2xl"></i>
                </div>
            </a>

            <!-- 2. 퀴즈 게임 카드 -->
            <a href="./binary/index.html" class="group bg-white p-6 rounded-2xl shadow-md hover:shadow-xl transition-all flex items-center border-2 border-transparent hover:border-blue-400">
                <div class="w-16 h-16 bg-blue-100 rounded-xl flex items-center justify-center text-blue-500 text-3xl mr-6 group-hover:scale-110 transition-transform">
                    <i class="fas fa-gamepad"></i>
                </div>
                <div class="text-left">
                    <h2 class="text-2xl font-bold text-slate-800">이진수 변환 퀴즈</h2>
                    <p class="text-slate-500">전구 게임을 통해 실력을 확인해보세요!</p>
                </div>
                <div class="ml-auto text-slate-300 group-hover:text-blue-400 transition-colors">
                    <i class="fas fa-chevron-right text-2xl"></i>
                </div>
            </a>

            <!-- 나중에 추가할 자리 -->
            <div class="bg-slate-100 p-6 rounded-2xl border-2 border-dashed border-slate-300 flex items-center opacity-60">
                <div class="w-16 h-16 bg-slate-200 rounded-xl flex items-center justify-center text-slate-400 text-3xl mr-6">
                    <i class="fas fa-star"></i>
                </div>
                <div class="text-left">
                    <h2 class="text-2xl font-bold text-slate-400">도전! 심화 학습</h2>
                    <p class="text-slate-400">더 큰 숫자와 소수 변환에 도전해보세요 (준비 중)</p>

        <footer class="mt-16 text-slate-400 text-sm">
            © 2024 이진수 학습 센터 | 선생님과 함께하는 즐거운 정보 시간
