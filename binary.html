<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이진수 전구 시뮬레이터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
        }

        .bulb-container {
            perspective: 1000px;
        }

        .bulb {
            width: 60px;
            height: 90px;
            background: #334155;
            border-radius: 50% 50% 40% 40% / 45% 45% 55% 55%;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: inset 0 -10px 15px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #475569;
        }

        .bulb::after {
            content: '';
            position: absolute;
            bottom: -15px;
            width: 30px;
            height: 20px;
            background: #94a3b8;
            border-radius: 4px;
            background: linear-gradient(to bottom, #94a3b8, #475569);
        }

        .bulb.active {
            background: #fde047;
            border-color: #facc15;
            box-shadow: 0 0 50px #eab308, inset 0 -5px 10px rgba(251, 191, 36, 0.5);
            transform: scale(1.05);
        }

        .bulb.active::before {
            content: '';
            position: absolute;
            top: 10px;
            left: 15px;
            width: 15px;
            height: 10px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            filter: blur(2px);
        }

        .digit-text {
            font-size: 1.5rem;
            font-weight: bold;
            color: #1e293b;
            user-select: none;
        }

        .bulb.active .digit-text {
            color: #854d0e;
        }

        .place-value {
            font-family: 'Courier New', Courier, monospace;
            background: #1e293b;
            padding: 4px 8px;
            border-radius: 6px;
            margin-top: 25px;
            color: #94a3b8;
        }

        .active-value {
            color: #fde047;
            font-weight: bold;
        }

        .result-box {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #334155;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); box-shadow: 0 0 60px #fde047; }
            100% { transform: scale(1); }
        }

        .bulb.active {
            animation: pulse 2s infinite ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <header class="text-center mb-10">
        <h1 class="text-4xl font-bold mb-2 text-yellow-400">💡 이진수 전구 시뮬레이터</h1>
        <p class="text-slate-400">전구를 클릭하여 0과 1의 세계를 배워보세요!</p>
    </header>

    <div class="max-w-6xl w-full flex flex-wrap justify-center gap-6 mb-12">
        <!-- 128, 64, 32, 16, 8, 4, 2, 1 -->
        <div class="bulb-unit flex flex-col items-center">
            <div class="bulb" onclick="toggleBulb(0)" id="bulb-0">
                <span class="digit-text" id="digit-0">0</span>
            </div>
            <div class="place-value" id="val-0">128</div>
        </div>
        <div class="bulb-unit flex flex-col items-center">
            <div class="bulb" onclick="toggleBulb(1)" id="bulb-1">
                <span class="digit-text" id="digit-1">0</span>
            </div>
            <div class="place-value" id="val-1">64</div>
        </div>
        <div class="bulb-unit flex flex-col items-center">
            <div class="bulb" onclick="toggleBulb(2)" id="bulb-2">
                <span class="digit-text" id="digit-2">0</span>
            </div>
            <div class="place-value" id="val-2">32</div>
        </div>
        <div class="bulb-unit flex flex-col items-center">
            <div class="bulb" onclick="toggleBulb(3)" id="bulb-3">
                <span class="digit-text" id="digit-3">0</span>
            </div>
            <div class="place-value" id="val-3">16</div>
        </div>
        <div class="bulb-unit flex flex-col items-center">
            <div class="bulb" onclick="toggleBulb(4)" id="bulb-4">
                <span class="digit-text" id="digit-4">0</span>
            </div>
            <div class="place-value" id="val-4">8</div>
        </div>
        <div class="bulb-unit flex flex-col items-center">
            <div class="bulb" onclick="toggleBulb(5)" id="bulb-5">
                <span class="digit-text" id="digit-5">0</span>
            </div>
            <div class="place-value" id="val-5">4</div>
        </div>
        <div class="bulb-unit flex flex-col items-center">
            <div class="bulb" onclick="toggleBulb(6)" id="bulb-6">
                <span class="digit-text" id="digit-6">0</span>
            </div>
            <div class="place-value" id="val-6">2</div>
        </div>
        <div class="bulb-unit flex flex-col items-center">
            <div class="bulb" onclick="toggleBulb(7)" id="bulb-7">
                <span class="digit-text" id="digit-7">0</span>
            </div>
            <div class="place-value" id="val-7">1</div>
        </div>
    </div>

    <div class="result-box rounded-2xl p-8 w-full max-w-2xl">
        <div class="grid grid-cols-2 gap-8">
            <div class="text-center border-r border-slate-700">
                <div class="text-sm text-slate-400 mb-1 uppercase tracking-widest">Binary (이진수)</div>
                <div id="binary-display" class="text-3xl font-mono font-bold text-blue-400">00000000</div>
            </div>
            <div class="text-center">
                <div class="text-sm text-slate-400 mb-1 uppercase tracking-widest">Decimal (십진수)</div>
                <div id="decimal-display" class="text-3xl font-mono font-bold text-green-400">0</div>
            </div>
        </div>
        
        <div class="mt-8 pt-6 border-t border-slate-700">
            <div class="text-sm text-slate-400 mb-4 text-center">계산식</div>
            <div id="formula-display" class="text-center text-lg font-mono text-slate-300 min-h-[1.5em]">
                0
            </div>
        </div>
        
        <div class="mt-8 flex justify-center">
            <button onclick="resetBulbs()" class="px-6 py-2 bg-slate-700 hover:bg-slate-600 rounded-full transition-colors font-bold text-sm">
                초기화
            </button>
        </div>
    </div>

    <footer class="mt-12 text-slate-500 text-sm italic">
        * 각 자릿수(Bit)는 2의 거듭제곱 값을 가집니다.
    </footer>

    <script>
        // 전구 상태 (0: OFF, 1: ON)
        let state = [0, 0, 0, 0, 0, 0, 0, 0];
        const values = [128, 64, 32, 16, 8, 4, 2, 1];

        function toggleBulb(index) {
            // 상태 변경
            state[index] = state[index] === 0 ? 1 : 0;
            updateUI();
        }

        function resetBulbs() {
            state = [0, 0, 0, 0, 0, 0, 0, 0];
            updateUI();
        }

        function updateUI() {
            let decimalResult = 0;
            let binaryString = "";
            let formulaParts = [];

            state.forEach((val, i) => {
                const bulb = document.getElementById(`bulb-${i}`);
                const digit = document.getElementById(`digit-${i}`);
                const placeVal = document.getElementById(`val-${i}`);

                binaryString += val;

                if (val === 1) {
                    bulb.classList.add('active');
                    digit.textContent = "1";
                    placeVal.classList.add('active-value');
                    decimalResult += values[i];
                    formulaParts.push(values[i]);
                } else {
                    bulb.classList.remove('active');
                    digit.textContent = "0";
                    placeVal.classList.remove('active-value');
                }
            });

            // 이진수 업데이트
            document.getElementById('binary-display').textContent = binaryString;
            
            // 십진수 업데이트
            document.getElementById('decimal-display').textContent = decimalResult;

            // 공식 업데이트
            const formulaDisplay = document.getElementById('formula-display');
            if (formulaParts.length > 0) {
                formulaDisplay.textContent = formulaParts.join(' + ') + ' = ' + decimalResult;
            } else {
                formulaDisplay.textContent = "0";
            }
        }

        // 초기 실행
        window.onload = updateUI;
    </script>
</body>
</html>
